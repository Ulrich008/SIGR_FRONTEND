<!-- Top bar -->
<div class="bg-white border-b border-gray-100 px-6 py-3 flex items-center justify-between flex-shrink-0">
  <div class="relative">
    <i class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400">🔍</i>
    <input
      type="text"
      [placeholder]="searchPlaceholder"
      class="pl-9 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-600 w-80 focus:outline-none focus:border-green-400 placeholder-gray-400"
      style="font-family: 'Inter', system-ui, sans-serif;"
    />
  </div>
  <div class="flex items-center gap-3">
    <span class="text-sm text-gray-500">{{ organizationName }}</span>
    <button
      type="button"
      (click)="confirmLogout()"
      class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50"
    >
      <span>Déconnexion</span>
    </button>
    <div class="w-8 h-8 rounded-full bg-green-700 flex items-center justify-center text-white text-xs font-bold">
      {{ userInitials }}
    </div>
  </div>
</div>
