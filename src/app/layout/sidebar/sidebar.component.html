<!-- SIDEBAR - Agrandie -->
<aside class="w-72 bg-white flex flex-col shadow-sm flex-shrink-0">
  <!-- Logo + SIGR - Centré -->
  <div class="px-6 pt-8 pb-6 border-b border-gray-100 flex flex-col items-center">
    <p class="text-2xl font-bold text-center" style="color: #1a4731;">SIGR</p>
    <p class="text-xs text-gray-400 mt-1 text-center">Gestion des Risques</p>
  </div>

  <!-- Nav - Espacement amélioré -->
  <nav class="flex-1 px-4 py-6">
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4 px-3">Menu principal</p>
    <ul class="space-y-1.5">
      <li *ngFor="let item of menuItems">
        <button
          (click)="onMenuItemClick(item)"
          [class.bg-green-700]="activeMenu === item.label"
          [class.text-white]="activeMenu === item.label"
          [class.font-medium]="activeMenu === item.label"
          class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm transition-all text-left text-gray-600 hover:bg-green-50 hover:text-green-800"
        >
          <i [class]="item.icon" class="w-5 h-5 flex-shrink-0"></i>
          {{ item.label }}
        </button>
      </li>
    </ul>
  </nav>

  <!-- Admin footer - Amélioré -->
  <div class="m-4 rounded-xl p-4 flex items-center gap-3" style="background: #1a5c38">
    <div class="w-10 h-10 rounded-xl bg-green-600 flex items-center justify-center text-white text-sm font-bold flex-shrink-0">
      AD
    </div>
    <div>
      <p class="text-white text-sm font-semibold leading-tight">Admin MEF</p>
      <p class="text-green-300 text-xs leading-tight mt-0.5">Administrateur</p>
    </div>
  </div>
</aside>
