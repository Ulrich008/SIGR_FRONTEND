<app-main-layout
  [menuItems]="menuItems"
  activeMenu="Structures"
  searchPlaceholder="Rechercher un ministère..."
  organizationName="Ministère de l'Économie et des Finances"
  userInitials="AD">

  <div class="p-4 md:p-6">
    <div class="max-w-6xl mx-auto space-y-6">

      <!-- En-tête -->
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <p class="text-sm text-gray-500">Administration</p>
          <h1 class="text-xl md:text-2xl font-semibold text-slate-900">Ministères</h1>
        </div>
        <!-- <button
          (click)="createMinistere()"
          class="inline-flex items-center justify-center rounded-lg bg-emerald-700 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-600"
        >
          Nouveau ministère
        </button> -->
      </div>

      <!-- Erreur -->
      <div *ngIf="error" class="rounded-lg border border-red-200 bg-red-50 p-4 text-sm text-red-700">
        {{ error }}
      </div>

      <!-- Tableau -->
      <div class="overflow-x-auto rounded-3xl bg-white shadow-sm">
        <table class="min-w-full table-auto border-collapse text-sm">
          <thead class="bg-slate-100 text-left text-xs uppercase tracking-wide text-slate-500">
            <tr>
              <th class="px-4 py-3 whitespace-nowrap">Code</th>
              <th class="px-4 py-3 whitespace-nowrap">Nom</th>
              <th class="px-4 py-3 whitespace-nowrap hidden md:table-cell">Sigle</th>
              <th class="px-4 py-3 whitespace-nowrap hidden lg:table-cell">Créé par</th>
              <th class="px-4 py-3 whitespace-nowrap">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let ministere of ministeres"
                class="border-t border-slate-200 hover:bg-slate-50">
              <td class="px-4 py-4 text-slate-700 whitespace-nowrap">{{ ministere.code }}</td>
              <td class="px-4 py-4 text-slate-700">{{ ministere.nom }}</td>
              <td class="px-4 py-4 text-slate-700 hidden md:table-cell">{{ ministere.sigle || '—' }}</td>
              <td class="px-4 py-4 text-slate-700 hidden lg:table-cell">{{ ministere.creePar || 'Anonyme' }}</td>
              <td class="px-4 py-4">
                <div class="flex items-center gap-2">

                  <!-- Modifier -->
                  <button
                    (click)="editMinistere(ministere.id)"
                    title="Modifier"
                    class="p-2 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 hover:text-slate-800 transition"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                  </button>

                  <!-- Supprimer -->
                  <button
                    (click)="deleteMinistere(ministere.id)"
                    title="Supprimer"
                    class="p-2 rounded-lg bg-red-100 text-red-600 hover:bg-red-200 hover:text-red-800 transition"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                  </button>

                </div>
              </td>
            </tr>
            <tr *ngIf="!loading && ministeres.length === 0">
              <td colspan="5" class="px-4 py-8 text-center text-slate-500">
                Aucun ministère trouvé.
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Chargement -->
      <div *ngIf="loading"
           class="rounded-3xl bg-white p-6 text-center text-sm text-slate-500 shadow-sm">
        Chargement des ministères...
      </div>

    </div>
  </div>

</app-main-layout>
